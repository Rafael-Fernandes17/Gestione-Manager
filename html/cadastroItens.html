<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Manager - Cadastro de Insumos</title>
    <link rel="stylesheet" href="../css/cadastrosItens.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

<div class="dashboard-container">
    <header class="main-header">
        <div class="logo-section">
            <h1>GESTIONE <span>MANAGER</span></h1>
        </div>
        <div class="page-title">
            
            <h2>Cadastro de Insumos</h2>
        </div>
    </header>

    <main class="content">
        <div class="form-container">
            <div class="form-header">
                <h3>Novo Registro</h3>
                <p>Identifique se o item é um insumo de cozinha ou produto de bar.</p>
            </div>

            <div class="form-grid">
                <div class="input-box full-width">
                    <label>Nome do Item</label>
                    <div class="input-field">
                        <span class="material-symbols-outlined">edit_note</span>
                        <input type="text" id="nome" placeholder="Ex: Filé Mignon ou Coca-Cola 350ml">
                    </div>
                </div>

                <div class="input-box">
                    <label>Categoria</label>
                    <div class="input-field">
                        <span class="material-symbols-outlined">layers</span>
                        <select id="categoria">
                            <option value="" disabled selected>Selecione...</option>
                            <option value="ingrediente">Ingrediente (Cozinha)</option>
                            <option value="bebida">Bebida (Bar)</option>
                        </select>
                    </div>
                </div>

                <div class="input-box">
                    <label>Unidade de Medida</label>
                    <div class="input-field">
                        <span class="material-symbols-outlined">straighten</span>
                        <input type="text" id="unidade" placeholder="kg, un, l, ml">
                    </div>
                </div>

                <div class="input-box full-width">
                    <label>Quantidade em Estoque</label>
                    <div class="input-field">
                        <span class="material-symbols-outlined">inventory_2</span>
                        <input type="number" id="quantidade" placeholder="0.00">
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <a href="sucessoCadastroItens.html" style="text-decoration: none;">
                    <button type="button" class="btn-submit">
                        <span class="material-symbols-outlined">save</span>
                        Salvar Item
                    </button>
                </a>
            </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/cadastroItens.js" defer></script>

</body>
</html>
