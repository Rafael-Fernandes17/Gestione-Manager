<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../img/logo.jpeg">
    <title>Cadastrar Produto para o Cardápio</title>
</head>
<body>
    <h1>Cadastrar Produto para o Cardápio</h1>

    <form action="../php/createProdutoCardapio.php" method="post">
        <label for="nomeProdutoCardapio">Nome do Produto:</label>
        <input type="text" id="nomeProdutoCardapio" name="nomeProdutoCardapio" required>

        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao"></textarea>

        <label for="tempoPreparo">Tempo de Preparo:</label>
        <input type="text" id="tempoPreparo" name="tempoPreparo" required>

        <label for="preco">Preço:</label>
        <input type="number" id="preco" name="preco" step="0.01" required>

        <label for="tipoMedida">Tipo de Medida:</label>
        <select id="tipoMedida" name="tipoMedida">
            <option value="kg">Quilograma</option>
            <option value="g">Gramas</option>
            <option value="l">Litros</option>
            <option value="ml">Mililitros</option>
        </select>

        <label for="status">Status:</label>
        <select id="status" name="status">
            <option value="disponivel">Disponível</option>
            <option value="indisponivel">Indisponível</option>
        </select>

        <button type="submit">Cadastrar Produto</button>
    </form>
</body>
</html>
