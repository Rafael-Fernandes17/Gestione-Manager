<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css"> <!-- Pode-se usar o mesmo CSS ou criar um novo -->
    <title>Alterar Senha</title>
</head>
<body>

    <main>
        <div id="caixaCentral">
            <div id="logo">
                <img src="../img/logo_Gestione2.jpeg">
            </div>

            <form id="formAlterarSenha">
                <p>É seu primeiro acesso. Por favor, altere sua senha.</p>
                <div class="caixa-organizadora">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="nova_senha" placeholder="Nova Senha" id="nova_senha" required>
                </div>
                    
                <div class="caixa-organizadora">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="confirmar_senha" placeholder="Confirmar Senha" id="confirmar_senha" required>
                </div>
                
                <div class="caixa-organizadora">
                    <button type="submit" id="botaoAlterarSenha">Alterar Senha</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/alterarSenha.js"></script>
</body>
</html>
